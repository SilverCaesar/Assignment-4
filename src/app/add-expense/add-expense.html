<div class="container mt-4 w-50">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-3 text-center">Add Expense</h4>
            <div class="mb-3">
                <label class="form-label">Expense Title</label>
                <input type="text" placeholder="Enter expense title" class="form-control ng-pristine ng-valid ng-touched"
                    #expenseTitle [class.is-invalid]="showWarning()" (input)="showWarning.set(false)">
            </div>
            <div class="mb-3">
                <label class="form-label">Amount ($)</label>
                <input type="number" placeholder="Enter amount" class="form-control ng-pristine ng-valid ng-touched"
                    #expenseAmount [class.is-invalid]="showWarning()" (input)="showWarning.set(false)">
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select ng-pristine ng-valid ng-touched"
                    #expenseCategory [class.is-invalid]="showWarning()" (input)="showWarning.set(false)">
                    <option value disabled selected>Select category</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Grocery">Grocery</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Travel">Travel</option>
                    <option value="Food">Food</option>
                </select>
            </div>
            <div class="d-grid">
                <!-- NEEDS CLICK EVENT SUBMIT -->
                <button class="btn btn-primary" [routerLink]="['/expenses']" (click)="onAddExpense(expenseTitle, expenseAmount, expenseCategory)"> Add Expense </button>
            </div>
        </div>
    </div>
</div>
