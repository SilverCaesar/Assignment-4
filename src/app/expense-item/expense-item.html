<div class="card shadow-sm mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-1"> {{expense().title}} </h5>
            <small class="fw-semibold" [style.color]="categoryColor()">{{expense().category}}</small>
        </div>

        <div class="text-end">
            @if(expense().amount > 100){
                <div class="fw-bold text-danger">
                    <p> {{expense().amount | currency:"USD":"symbol"}}</p>
                </div>
            }
            @else{
                <div class="fw-bold text-success">
                    <p> {{expense().amount | currency:"USD":"symbol"}}</p>
                </div>
            }

            <button class="btn btn-primary btn-sm m-2" [routerLink]="['/edit', expense().id]"> Edit </button>
            <button class="btn btn-danger btn-sm m-2" (click)="onDeleteExpense()"> Delete </button>
        </div>
    </div>
</div>
